const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function speak(text) {
  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang='ms-MY'; u.rate=0.75; u.pitch=1.1;
    window.speechSynthesis.speak(u);
  }
}

function playTone(freq,dur){
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sine';o.frequency.value=freq;
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}

function playCorrect(){playTone(523,0.1);setTimeout(()=>playTone(659,0.1),100);setTimeout(()=>playTone(784,0.2),200)}
function playWrong(){playTone(300,0.2);setTimeout(()=>playTone(250,0.3),200)}
function playClick(){playTone(600,0.08)}
function playCelebration(){
  const celebrationTone=()=>{
    playTone(523,0.15);  
    setTimeout(()=>playTone(659,0.15),180);  
    setTimeout(()=>playTone(784,0.25),360);  
  };
  
  const celebrationTone2=()=>{
    playTone(587,0.12);  
    setTimeout(()=>playTone(698,0.12),160);  
    setTimeout(()=>playTone(880,0.20),320);  
  };
  
  for(let i=0;i<4;i++){
    if(i%2===0){
      setTimeout(celebrationTone,i*700);
    }else{
      setTimeout(celebrationTone2,i*700);
    }
  }
}

    el.appendChild(p);
    setTimeout(()=>p.remove(),2000);
  }

function createFireworks(){
  const colors=['#FFD700','#FFA500','#FF1744','#4ECDC4','#A78BFA'];
  const waves=10;
  const waveDuration=4000;
  const waveInterval=waveDuration/waves;
  
  for(let w=0;w<waves;w++){
    setTimeout(()=>{
      const burstPoint={
        x:Math.random()*window.innerWidth,
        y:Math.random()*window.innerHeight
      };
      
      for(let i=0;i<80;i++){
        const p=document.createElement('div');
        p.className='firework-burst';
        const angle=(i/80)*Math.PI*2;
        const dist=150+Math.random()*300;
        const tx=Math.cos(angle)*dist;
        const ty=Math.sin(angle)*dist;
        p.style.cssText=`
          left:${burstPoint.x}px;
          top:${burstPoint.y}px;
          width:24px;
          height:24px;
          font-size:24px;
          display:flex;
          align-items:center;
          justify-content:center;
          --tx:${tx}px;
          --ty:${ty}px;
          animation:firework-burst ${1+Math.random()*0.6}s ease-out forwards;
          animation-delay:${Math.random()*0.3}s;
          border-radius:50%;
        `;
        p.textContent='⭐';
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),3000);
      }

    },w*waveInterval);
  }
}

function showSmallFireworks(){

    state.dailyChallenge={completed:false,type:['huruf','sukukata','perkataan','ayat'][Math.floor(Math.random()*4)],target:10,progress:0};

function resetProgress(){
  if(!confirm('Adakah anda pasti ingin tetapkan semula semua data? Bintang, mata, badge & statistik akan dipadam. Profil anda akan dikekalkan.')) return;
  playWrong();
  // Save profile fields
  const keep = {
    studentName: state.studentName,
    studentAvatar: state.studentAvatar,
    parentNote: state.parentNote,
    teacherTip: state.teacherTip,
  };
  // Reset progress fields
  state.stars=[false,false,false,false];
  state.gamePoints=0;
  state.streak=0;
  state.bestStreak=0;
  state.totalGamesPlayed=0;
  state.badges=[];

  state.perfectScores=0;
  state.dailyChallenge={completed:false,type:'huruf',target:5,progress:0};
  state.lastPlayDate=null;
  state.hurufIdsSeen=new Set();
  state.sukuIdsSeen=new Set();
  state.wordsSeen=new Set();
  state.wordsSeenCount=0;
  state.ayatSeen=new Set();
  state.ayatSeenCount=0;
  state.usedIndices=[];
  state.rodaCurrentWord=null;
  state.gameQ=0;
  state.gameScore=0;
  // Restore profile
  Object.assign(state, keep);
  // Go home + sync
  state.screen='home';
  render();
  syncNow();
  setTimeout(()=>alert('✅ Data telah ditetapkan semula. Mulakan pembelajaran baru!'),200);
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function startGame(type){
  state.gameType=type;state.gameQ=0;state.gameScore=0;state.gameFeedback=null;state.usedIndices=[];
  state.gameTotal=state.difficulty==='mudah'?3:state.difficulty==='sukar'?10:5;
  if(type==='rodaImpian'){
    state.screen='rodaImpian';
    state.rodaCurrentWord=null;
    state.rodaIsSpinning=false;
    state.wheelSpinCount++;
  } else {
    generateQuestion();
    state.screen='playing';
  }
  render();
}

function generateQuestion(){
  state.gameFeedback=null;
  if(state.gameType==='tekaGambar'){
    const availableIndices=Array.from({length:PERKATAAN.length},((_,i)=>i)).filter(i=>!state.usedIndices.includes(i));
    if(availableIndices.length===0)return;
    const idx=availableIndices[Math.floor(Math.random()*availableIndices.length)];
    state.usedIndices.push(idx);
    const correct=PERKATAAN[idx];
    let opts=[correct];
    const availableOpts=PERKATAAN.filter((_,i)=>i!==idx);
    while(opts.length<3&&availableOpts.length>0){const r=availableOpts[Math.floor(Math.random()*availableOpts.length)];if(!opts.find(o=>o.p===r.p)){opts.push(r);availableOpts.splice(availableOpts.indexOf(r),1);}}
    state.gameData={correct,opts:shuffle(opts)};
    state.gameAnswer=correct.p;
  } else if(state.gameType==='pilihJawapan'){
    const availableIndices=Array.from({length:SUKUKATA.length},((_,i)=>i)).filter(i=>!state.usedIndices.includes(i));
    if(availableIndices.length===0)return;
    const idx=availableIndices[Math.floor(Math.random()*availableIndices.length)];
    state.usedIndices.push(idx);
    const correct=SUKUKATA[idx];
    let opts=[correct.p];
    const availableOpts=SUKUKATA.filter((_,i)=>i!==idx);
    while(opts.length<3&&availableOpts.length>0){const r=availableOpts[Math.floor(Math.random()*availableOpts.length)].p;if(!opts.includes(r)){opts.push(r);availableOpts.splice(availableOpts.findIndex(x=>x.p===r),1);}}
    state.gameData={correct,opts:shuffle(opts)};
    state.gameAnswer=correct.p;
  } else if(state.gameType==='padanHuruf'){
    const availableIndices=Array.from({length:HURUF.length},((_,i)=>i)).filter(i=>!state.usedIndices.includes(i));
    if(availableIndices.length===0)return;
    const idx=availableIndices[Math.floor(Math.random()*availableIndices.length)];
    state.usedIndices.push(idx);
    const correct=HURUF[idx];
    let opts=[correct];
    const availableOpts=HURUF.filter((_,i)=>i!==idx);
    while(opts.length<3&&availableOpts.length>0){const r=availableOpts[Math.floor(Math.random()*availableOpts.length)];if(!opts.find(o=>o.h===r.h)){opts.push(r);availableOpts.splice(availableOpts.indexOf(r),1);}}
    state.gameData={correct,opts:shuffle(opts)};
    state.gameAnswer=correct.h;
  } else if(state.gameType==='susunSuku'){
    const availableIndices=Array.from({length:SUKUKATA.length},((_,i)=>i)).filter(i=>!state.usedIndices.includes(i));
    if(availableIndices.length===0)return;
    const idx=availableIndices[Math.floor(Math.random()*availableIndices.length)];
    state.usedIndices.push(idx);
    const correct=SUKUKATA[idx];
    const parts=shuffle([correct.s1,correct.s2]);
    state.gameData={correct,parts,selected:[]};
    state.gameAnswer=correct.p;
  }
}

function answerGame(ans){
  if(state.gameFeedback)return;
  state.lifetimeStats.totalQuestionsAnswered++;
  if(ans===state.gameAnswer){
    state.gameScore++;
    state.lifetimeStats.correctAnswers++;
    state.gameFeedback='correct';playCorrect();
    const card=document.getElementById('game-card');if(card)showConfetti(card);
    if(state.gameScore===state.gameTotal){
      state.perfectScores++;
      state.lifetimeStats.perfectScores++;
    }
  } else {
    state.gameFeedback='wrong';playWrong();
  }
  render();
  setTimeout(()=>{
    state.gameQ++;
    if(state.gameQ>=state.gameTotal){
      state.gamePoints+=state.gameScore*2;
      state.lifetimeStats.totalPointsEarned+=state.gameScore*2;
      state.lifetimeStats.gamesCompleted++;
      state.totalGamesPlayed++;
      state.screen='gameResult';
      checkAndUnlockBadges();
      render();
    }
    else{generateQuestion();render();}
  },1200);
}

function selectSuku(part,idx){
  if(state.gameFeedback)return;
  state.gameData.selected.push({part,idx});
  if(state.gameData.selected.length===2){
    const word=state.gameData.selected.map(s=>s.part).join('');
    answerGame(word);

function spinRoda(){
  if(state.rodaIsSpinning)return;
  
  state.rodaIsSpinning=true;
  playClick();
  
  const spinDuration=1500;
  const spins=Math.floor(Math.random()*8)+8;
  const randomDegree=Math.random()*360;
  const totalDegree=spins*360+randomDegree;
  
  const wheel=document.getElementById('roda-wheel');
  if(wheel){
    wheel.style.transition=`transform ${spinDuration}ms cubic-bezier(0.25,0.46,0.45,0.94)`;
    wheel.style.transform=`rotate(${totalDegree}deg)`;
  }
  
  setTimeout(()=>{
    const availableIndices=Array.from({length:PERKATAAN.length},((_,i)=>i)).filter(i=>!state.usedIndices.includes(i));
    if(availableIndices.length>0){
      const idx=availableIndices[Math.floor(Math.random()*availableIndices.length)];
      state.usedIndices.push(idx);
      state.rodaCurrentWord=PERKATAAN[idx];
      playTone(523,0.15);
      setTimeout(()=>playTone(659,0.15),100);
      setTimeout(()=>playTone(784,0.2),200);
    }
    state.rodaIsSpinning=false;
    render();
  },spinDuration);
}

function confirmReadRoda(){
  if(!state.rodaCurrentWord)return;
  
  playCorrect();
  state.gameScore++;
  state.lifetimeStats.correctAnswers++;
  state.lifetimeStats.totalQuestionsAnswered++;
  state.gameQ++;
  
  showSmallFireworks();
  
  setTimeout(()=>{
    if(state.gameQ>=state.gameTotal){
      state.gamePoints+=state.gameScore*2;
      state.lifetimeStats.totalPointsEarned+=state.gameScore*2;
      state.lifetimeStats.gamesCompleted++;
      state.totalGamesPlayed++;
      state.screen='gameResult';
      checkAndUnlockBadges();
      render();
    } else {
      state.rodaCurrentWord=null;
      render();
    }
  },1200);
}

// ---- Backend sync ----
const BACKEND = (window.location.origin);
const PROGRESS_KEYS = ['stars','gamePoints','streak','bestStreak','totalGamesPlayed','badges','lifetimeStats',
  'wheelSpinCount','totalHurufLearned','totalAyatsRead','totalWordsLearned','perfectScores',
  'studentAvatar','parentNote','teacherTip','dailyChallenge','lastPlayDate'];
let syncTimer=null, syncBusy=false;
function extractProgress(){
  const o={}; PROGRESS_KEYS.forEach(k=>{ if(state[k]!==undefined) o[k]=state[k]; }); return o;
}
async function loadProgress(){
  try{
    const r=await fetch(BACKEND+'/api/progress',{credentials:'include'});
    if(!r.ok) return;
    const data=await r.json();
    if(data.name) state.studentName=data.name;
    const p=data.progress||{};
    PROGRESS_KEYS.forEach(k=>{ if(p[k]!==undefined) state[k]=p[k]; });
    render();
  }catch(e){console.warn('loadProgress',e)}
}
async function syncNow(){
  if(syncBusy) return;
  syncBusy=true;
  try{
    await fetch(BACKEND+'/api/progress',{method:'PUT',credentials:'include',
      headers:{'Content-Type':'application/json'},body:JSON.stringify(extractProgress())});
  }catch(e){console.warn('sync',e)}
  syncBusy=false;
}
function queueSync(){ clearTimeout(syncTimer); syncTimer=setTimeout(syncNow,1200); }
// Hook render so any state change auto-syncs
const _origRender=render;
render=function(){ _origRender(); queueSync(); };
// Hook save button in profile to sync immediately after name change
loadProgress();
window.addEventListener('beforeunload',()=>{
  try{ navigator.sendBeacon && navigator.sendBeacon(BACKEND+'/api/progress',
    new Blob([JSON.stringify(extractProgress())],{type:'application/json'})); }catch(e){}
});

function prevAyat(){state.ayatIdx=Math.max(0,state.ayatIdx-1);render()}
function nextAyat(){state.ayatIdx=Math.min(AYAT.length-1,state.ayatIdx+1);render()}

render();
